<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For My Baby ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Stars -->
    <div id="stars"></div>

    <!-- Hearts -->
    <div id="hearts"></div>

    <div class="container">

        <h1 id="welcome"></h1>

        <p class="subtitle">

            Every second brings me closer to celebrating you ❤️

        </p>

        <div class="countdown">

            <div class="box">

                <h2 id="days">00</h2>

                <span>Days</span>

            </div>

            <div class="box">

                <h2 id="hours">00</h2>

                <span>Hours</span>

            </div>

            <div class="box">

                <h2 id="minutes">00</h2>

                <span>Minutes</span>

            </div>

            <div class="box">

                <h2 id="seconds">00</h2>

                <span>Seconds</span>

            </div>

        </div>

        <div class="buttons">

    <button onclick="openLetter()">💌 Letter</button>

    <button onclick="compliment()">❤️ Compliment</button>

    <button onclick="surprise()">🎁 Surprise</button>

    <button onclick="wish()">🌠 Wish</button>

    <button onclick="flower()">🌸 Flower</button>

    <button onclick="memory()">📖 Memory</button>

    <button onclick="gift()">🎀 Gift</button>

    <button onclick="reason()">💖 Why I Like You</button>

</div>

        <div id="messageBox">

            Click a button ❤️

        </div>

        <footer>

            Made with ❤️ just for you

        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
